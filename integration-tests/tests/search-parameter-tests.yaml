        - mii-exa-test-data-onko-strahlentherapie-bestrahlung-1

  - sp_code: bestrahlung-zielgebiet-lateralitaet
    sp_source: onkologie
    base: Procedure
    query: "Procedure?bestrahlung-zielgebiet-lateralitaet=L"
    expected:
      min_total: 1
      contains_id:
        - mii-exa-test-data-onko-strahlentherapie-bestrahlung-1

  # ===========================================================================
  # Onkologie: TNM SearchParameters
  # Source: modul-onkologie/core/TNM.fsh (Covers: tnm-n-itc, tnm-n-sn-suffix)
  # ===========================================================================
  - sp_code: tnm-n-itc
    sp_source: onkologie
