# SearchParameter Integration Tests
# Phase 1: Explicit tests for documented "Covers:" SearchParameters
# Phase 2: Auto-generated smoke tests (HTTP 200 + valid Bundle) for all ~200 SPs
# Phase 3: Incremental deeper assertions (min_total, contains_id)
#
# Fields:
#   sp_code:       SearchParameter code (as used in query)
#   sp_source:     Package source: meta, onkologie, icu, molgen, pros, studie
#   base:          FHIR resource type
#   query:         FHIR search query string (relative to base URL)
#   expected:
#     min_total:   Minimum expected search result total
#     contains_id: List of resource IDs that MUST appear in results
#   skip_servers:  Optional list of servers to skip: ["hapi"] or ["blaze"]

tests:
  # ===========================================================================
  # Onkologie: Strahlentherapie Bestrahlung SearchParameters
  # Source: modul-onkologie/core/Therapie.fsh (Covers: bestrahlung-*)
  # ===========================================================================
  - sp_code: bestrahlung-strahlenart
    sp_source: onkologie
    base: Procedure
    query: "Procedure?bestrahlung-strahlenart=UH"
    expected:
      min_total: 1
      contains_id:
        - mii-exa-test-data-onko-strahlentherapie-bestrahlung-1

  - sp_code: bestrahlung-applikationsart
    sp_source: onkologie
    base: Procedure
    query: "Procedure?bestrahlung-applikationsart=PRCJ"
